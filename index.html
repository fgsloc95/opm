<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>OPM v3.2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="center-box">
    <h2>OT Project Manager</h2>

    <select id="userSelect">
      <option value="">Selecione um usuário</option>
      <option value="Felipe">Doleta</option>
      <option value="Dev2">Frost</option>
    </select>

    <button id="loginBtn">Accept</button>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">
    <header>
      <span id="activeUser"></span>
    </header>

    <main>
        <div id="tabs">
            <button onclick="setView('tree')">Full View</button>
            <button onclick="setView('impact')">Impact View</button>
            <button onclick="setView('clean')">Clean View</button>
            <button onclick="setView('kanban')">Cards View</button>
            <button onclick="setView('log')">Changes BackLog</button>
        </div>

        <div id="topActions">
            <button onclick="toggleFocus()">Hide Completed Tasks</button>
            <button onclick="createRootTask()">+ Nova Task Chave</button>
            <input type="text" placeholder="Buscar..." oninput="handleSearch(this.value)"> 
            <input placeholder="Filtrar por tag..." oninput="setKanbanFilter(this.value)">
        </div>

      <div id="viewContainer"></div> 
    </main>

    <div id="editorPanel" class="editor hidden">
    <h2>Editar Task</h2>

    <label>Título</label>
    <input id="editTitle">

    <label>Status</label>
    <select id="editStatus">
        <option value="idea">Idea</option>
        <option value="to do">To Do</option>
        <option value="doing">Doing</option>
        <option value="done">Done</option>
    </select>

    <label>Tipo</label>
    <select id="editType">
        <option value="feature">Feature</option>
        <option value="bug">Bug</option>
        <option value="refactor">Refactor</option>
        <option value="research">Research</option>
    </select>

    <label>Descrição</label>
    <textarea id="editDescription"></textarea>

    <label>Tags</label>
    <input id="editTags">

    <hr>
    <h3>Asset Manifest</h3>
    <div class="manifest-grid">
        <div>
            <label>Server Source</label>
            <textarea id="editServerSource"></textarea>
        </div>
        <div>
            <label>Server Lua</label>
            <textarea id="editServerLua"></textarea>
        </div>
        <div>
            <label>Client Source</label>
            <textarea id="editClientSource"></textarea>
        </div>
        <div>
            <label>Client Lua</label>
            <textarea id="editClientLua"></textarea>
        </div>
        <button onclick="saveEditor()">Salvar</button>
        <button onclick="closeEditor()">Cancelar</button>
    </div>

  <script src="app.js"></script>
</body>
</html>
